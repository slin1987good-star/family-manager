<!DOCTYPE html>
<html lang="zh" style="--fs-scale: 1;">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#FBF6EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>家庭管理系统 · 温暖治愈</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
/* ========== design tokens ========== */
:root {
  --bg: #FBF6EC;
  --bg-soft: #F4EADA;
  --surface: #FFFFFF;
  --surface-muted: #FAF2E4;
  --ink: #3A332B;
  --ink-soft: #6B5F52;
  --ink-faint: #A89A8A;
  --line: #E8DCC7;
  --line-soft: #F0E6D3;

  --coral: #D98F6C;
  --coral-soft: #F6D9C8;
  --olive: #8A9A5B;
  --olive-soft: #DBE1C1;
  --lavender: #9A8FB0;
  --lavender-soft: #E0DAEA;
  --honey: #C79E5A;
  --honey-soft: #F1E2C2;

  --radius-sm: 10px;
  --radius-md: 16px;
  --radius-lg: 22px;
  --radius-xl: 28px;

  --shadow-card: 0 1px 2px rgba(58,51,43,0.04), 0 8px 24px rgba(58,51,43,0.06);
  --shadow-soft: 0 2px 12px rgba(58,51,43,0.05);

  --font-body: 'Nunito', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', system-ui, sans-serif;
  --font-hand: 'Caveat', 'Nunito', cursive;

  --fs-scale: 1;
}

.theme-dark {
  --bg: #23201C;
  --bg-soft: #2C2823;
  --surface: #2E2A25;
  --surface-muted: #362F28;
  --ink: #F4ECDE;
  --ink-soft: #C9BDA8;
  --ink-faint: #8A7E6B;
  --line: #3E362D;
  --line-soft: #332D26;
  --coral-soft: #4A3427;
  --olive-soft: #353B25;
  --lavender-soft: #3A3544;
  --honey-soft: #413520;
  --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 8px 24px rgba(0,0,0,0.35);
}

.palette-mint {
  --bg: #F1F6F0; --bg-soft: #E3ECDF; --surface: #FFFFFF; --surface-muted: #EDF3EA;
  --ink: #2C352D; --ink-soft: #5E6A5F; --line: #D7E2D2; --line-soft: #E5EDE0;
  --coral: #6FA78A; --coral-soft: #D2E4D7;
  --olive: #7C9D6A; --olive-soft: #DCE6CE;
  --lavender: #8AA9B2; --lavender-soft: #D6E3E6;
  --honey: #C1A86B; --honey-soft: #EDE2C4;
}

.palette-rose {
  --bg: #FCF3F1; --bg-soft: #F6E4DE; --surface: #FFFFFF; --surface-muted: #FAEAE4;
  --ink: #3C2A27; --ink-soft: #6F564F; --line: #EDD6CD; --line-soft: #F4E3DB;
  --coral: #D97461; --coral-soft: #F6D5CC;
  --olive: #B38A7F; --olive-soft: #EAD6CF;
  --lavender: #A993A8; --lavender-soft: #E5D8E2;
  --honey: #C98E5A; --honey-soft: #F1D9BC;
}

html, body {
  margin: 0; padding: 0; background: var(--bg);
  color: var(--ink);
  font-family: var(--font-body);
  font-size: calc(15px * var(--fs-scale));
  -webkit-font-smoothing: antialiased;
  height: 100%; overscroll-behavior: none;
}
#root {
  height: 100dvh; height: 100vh;
  display: flex; flex-direction: column;
  overflow: hidden;
  background: var(--bg);
}
* { box-sizing: border-box; }
button { font-family: inherit; }
.hand { font-family: var(--font-hand); font-weight: 600; }

.scroll-hide::-webkit-scrollbar { display: none; }
.scroll-hide { -ms-overflow-style: none; scrollbar-width: none; }

.app {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--ink);
  overflow-y: auto; overflow-x: hidden; position: relative;
}

.tabbar {
  position: fixed; left: 0; right: 0; bottom: 0; z-index: 50;
  display: flex; background: var(--surface);
  border-top: 1px solid var(--line);
  padding: 6px 8px calc(10px + env(safe-area-inset-bottom));
  gap: 4px;
}
.tabbar button {
  flex: 1; border: 0; background: transparent;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
  padding: 6px 4px; color: var(--ink-faint); font-size: 11px;
  cursor: pointer; border-radius: 10px;
}
.tabbar button.active { color: var(--coral); background: var(--coral-soft); }

.card {
  background: var(--surface); border-radius: var(--radius-lg);
  padding: 16px; box-shadow: var(--shadow-card);
  border: 1px solid var(--line-soft);
}

.chip {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 999px;
  font-size: 12px; font-weight: 600;
  background: var(--surface-muted); color: var(--ink-soft);
}

.btn {
  border: 0; border-radius: 999px;
  padding: 12px 18px; font-weight: 700; font-size: 14px;
  cursor: pointer; font-family: inherit;
}
.btn-primary { background: var(--coral); color: #fff; }
.btn-primary:disabled { background: var(--line); color: var(--ink-faint); cursor: not-allowed; }
.btn-ghost { background: var(--surface-muted); color: var(--ink); }

.avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 22px; flex-shrink: 0;
  background: var(--surface-muted); line-height: 1;
}
.avatar.lg { width: 56px; height: 56px; font-size: 30px; }
.avatar.sm { width: 28px; height: 28px; font-size: 16px; }

.member-dad { background: var(--coral-soft); }
.member-mom { background: var(--olive-soft); }
.member-daughter { background: var(--lavender-soft); }
.member-son { background: var(--honey-soft); }

.ai-card {
  background: linear-gradient(135deg, var(--lavender-soft) 0%, var(--coral-soft) 100%);
  border: 1px solid var(--lavender-soft);
}
.theme-dark .ai-card {
  background: linear-gradient(135deg, rgba(154,143,176,0.18) 0%, rgba(217,143,108,0.16) 100%);
  border: 1px solid var(--line);
}

.tag-conflict { background: var(--coral-soft); color: #8A4A2E; }
.tag-important { background: var(--honey-soft); color: #7A5618; }
.tag-habit { background: var(--olive-soft); color: #4A5A22; }
.tag-daily { background: var(--lavender-soft); color: #4E4668; }
.theme-dark .tag-conflict { color: #F3B499; }
.theme-dark .tag-important { color: #E9C98B; }
.theme-dark .tag-habit { color: #C5D49A; }
.theme-dark .tag-daily { color: #C4B8D7; }

.readonly-badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 4px 10px;
  background: var(--lavender-soft); color: var(--ink-soft);
  border-radius: 999px; font-size: 11px; font-weight: 700;
}

/* ========== stage ========== */
.page {
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  padding: 24px 16px;
  background:
    radial-gradient(1200px 600px at 20% 0%, rgba(217,143,108,0.12), transparent 50%),
    radial-gradient(1000px 500px at 80% 100%, rgba(154,143,176,0.12), transparent 50%),
    #2a2622;
}
.device-wrap { position: relative; }
.canvas-label {
  position: absolute; top: -28px; left: 0;
  color: rgba(255,255,255,0.55); font-family: 'Nunito';
  font-size: 12px; font-weight: 700; letter-spacing: 1px;
}
.phone-frame {
  width: 380px; height: 820px;
  background: #0b0b0b; border-radius: 44px; padding: 12px;
  box-shadow:
    0 0 0 2px #1a1815,
    0 40px 100px rgba(0,0,0,0.5),
    inset 0 0 0 2px rgba(255,255,255,0.04);
  position: relative;
}
.phone-inner {
  width: 100%; height: 100%;
  border-radius: 34px; overflow: hidden;
  background: var(--bg);
  display: flex; flex-direction: column;
  position: relative;
}
.status-bar {
  height: 28px; padding: 6px 22px 0;
  display: flex; justify-content: space-between; align-items: center;
  font-family: 'Nunito'; font-size: 12px; font-weight: 700; color: var(--ink);
  background: var(--bg-soft); flex-shrink: 0;
}
.notch {
  position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
  width: 100px; height: 26px; background: #0b0b0b;
  border-radius: 0 0 14px 14px; z-index: 100;
}
.bottom-bar-spacer { height: 8px; background: var(--bg); }

.scene-switcher {
  position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%); z-index: 9998;
  background: rgba(42, 38, 34, 0.92); backdrop-filter: blur(12px);
  color: #f4ecde; border: 1px solid rgba(255,255,255,0.12);
  padding: 6px; border-radius: 999px;
  display: flex; gap: 2px; flex-wrap: wrap; max-width: 92vw;
  font-family: 'Nunito'; font-size: 12px; font-weight: 700;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
}
.scene-switcher button {
  border: 0; background: transparent; color: #f4ecde; opacity: 0.6;
  padding: 8px 14px; border-radius: 999px; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
}
.scene-switcher button.active { background: #D98F6C; opacity: 1; color: #fff; }

.tweak-toggle {
  position: fixed; right: 24px; top: 24px; z-index: 9999;
  background: #3a332b; color: #f4ecde; border: 1px solid rgba(255,255,255,0.1);
  padding: 8px 14px; border-radius: 999px; font-family: ui-monospace, Menlo;
  font-size: 11px; font-weight: 700; letter-spacing: 1px; cursor: pointer;
}
</style>
</head>

<div id="root"></div>

<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

/* ========== icons ========== */
const Icon = ({ name, size = 20, color = 'currentColor', style = {} }) => {
  const s = { width: size, height: size, display: 'inline-block', verticalAlign: 'middle', ...style };
  const common = {
    width: size, height: size, viewBox: '0 0 24 24', fill: 'none',
    stroke: color, strokeWidth: 1.7, strokeLinecap: 'round', strokeLinejoin: 'round',
  };
  switch (name) {
    case 'home': return (<svg {...common} style={s}><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M10 20v-6h4v6"/></svg>);
    case 'list': return (<svg {...common} style={s}><path d="M4 6h16M4 12h16M4 18h10"/></svg>);
    case 'plus': return (<svg {...common} style={s}><path d="M12 5v14M5 12h14"/></svg>);
    case 'settings': return (<svg {...common} style={s}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.3 1.8l.1.1a2 2 0 11-2.8 2.8l-.1-.1a1.7 1.7 0 00-1.8-.3 1.7 1.7 0 00-1 1.5V21a2 2 0 11-4 0v-.1a1.7 1.7 0 00-1-1.5 1.7 1.7 0 00-1.8.3l-.1.1a2 2 0 11-2.8-2.8l.1-.1a1.7 1.7 0 00.3-1.8 1.7 1.7 0 00-1.5-1H3a2 2 0 110-4h.1a1.7 1.7 0 001.5-1 1.7 1.7 0 00-.3-1.8l-.1-.1a2 2 0 112.8-2.8l.1.1a1.7 1.7 0 001.8.3h0a1.7 1.7 0 001-1.5V3a2 2 0 114 0v.1a1.7 1.7 0 001 1.5 1.7 1.7 0 001.8-.3l.1-.1a2 2 0 112.8 2.8l-.1.1a1.7 1.7 0 00-.3 1.8v0a1.7 1.7 0 001.5 1H21a2 2 0 110 4h-.1a1.7 1.7 0 00-1.5 1z"/></svg>);
    case 'chart': return (<svg {...common} style={s}><path d="M4 19V5"/><path d="M4 19h16"/><path d="M8 16v-6M12 16V8M16 16v-4"/></svg>);
    case 'bell': return (<svg {...common} style={s}><path d="M6 8a6 6 0 0112 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10 21a2 2 0 004 0"/></svg>);
    case 'sparkle': return (<svg {...common} style={s}><path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5L12 3z"/><path d="M19 15l.7 2L22 18l-2.3.7L19 21l-.7-2.3L16 18l2.3-1z"/></svg>);
    case 'heart': return (<svg {...common} style={s}><path d="M20.8 5.6a5.5 5.5 0 00-7.8 0L12 6.6l-1-1a5.5 5.5 0 10-7.8 7.8l1 1L12 22l7.8-7.6 1-1a5.5 5.5 0 000-7.8z"/></svg>);
    case 'chat': return (<svg {...common} style={s}><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>);
    case 'clock': return (<svg {...common} style={s}><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>);
    case 'arrow-right': return (<svg {...common} style={s}><path d="M5 12h14M13 6l6 6-6 6"/></svg>);
    case 'arrow-left': return (<svg {...common} style={s}><path d="M19 12H5M11 6l-6 6 6 6"/></svg>);
    case 'check': return (<svg {...common} style={s}><path d="M5 12l5 5L20 7"/></svg>);
    case 'close': return (<svg {...common} style={s}><path d="M6 6l12 12M18 6L6 18"/></svg>);
    case 'lock': return (<svg {...common} style={s}><rect x="4" y="11" width="16" height="10" rx="2"/><path d="M8 11V7a4 4 0 118 0v4"/></svg>);
    case 'eye': return (<svg {...common} style={s}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>);
    case 'edit': return (<svg {...common} style={s}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 113 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>);
    case 'calendar': return (<svg {...common} style={s}><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 10h18M8 3v4M16 3v4"/></svg>);
    case 'book': return (<svg {...common} style={s}><path d="M4 4h11a4 4 0 014 4v13H8a4 4 0 01-4-4V4z"/><path d="M4 17h13"/></svg>);
    case 'family': return (<svg {...common} style={s}><circle cx="9" cy="8" r="3"/><circle cx="17" cy="10" r="2.5"/><path d="M3 20c0-3 2.5-5 6-5s6 2 6 5"/><path d="M15 20c0-2 2-4 4-4s2 1 2 2"/></svg>);
    case 'more': return (<svg {...common} style={s}><circle cx="12" cy="5" r="1.3"/><circle cx="12" cy="12" r="1.3"/><circle cx="12" cy="19" r="1.3"/></svg>);
    case 'mic': return (<svg {...common} style={s}><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M5 11a7 7 0 0014 0M12 19v3"/></svg>);
    case 'send': return (<svg {...common} style={s}><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7z"/></svg>);
    default: return null;
  }
};

/* ========== API wiring ========== */
const API_BASE = location.hostname.endsWith('fly.dev') || location.hostname === 'localhost'
  ? ''  // same-origin when hosted on fly or local
  : 'https://gw-family-manager.fly.dev';

const storage = {
  get token() { return localStorage.getItem('family-token'); },
  set token(v) { v ? localStorage.setItem('family-token', v) : localStorage.removeItem('family-token'); },
};

async function api(path, opts = {}) {
  const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
  if (storage.token) headers.Authorization = `Bearer ${storage.token}`;
  const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
  if (res.status === 401) {
    storage.token = null;
    window.dispatchEvent(new Event('family-unauthorized'));
    throw new Error('unauthorized');
  }
  if (res.status === 204) return null;
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.detail || `HTTP ${res.status}`);
  return data;
}

/* Populated from API at app startup. Keeps existing function signatures working. */
let FAMILY = {};
let MEMBERS_LIST = [];
let EVENTS = [];

const buildMembers = (users) => {
  FAMILY = {};
  users.forEach(u => {
    const p = u.profile || {};
    FAMILY[u.id] = {
      ...u, ...p,
      tag: u.role === 'editor' ? '编辑者' : '查看者',
      recordCount: p.recordCount ?? 0,
    };
  });
  MEMBERS_LIST = ['dad', 'mom', 'daughter', 'son'].map(id => FAMILY[id]).filter(Boolean);
};

/* Map backend snake_case event to the camelCase shape used throughout the UI. */
const normalizeEvent = (e) => ({
  id: e.id,
  type: e.type,
  title: e.title,
  desc: e.description || '',
  members: e.members || [],
  author: e.author_id,
  time: e.time_label || '',
  date: e.event_date || '',
  mood: e.mood || undefined,
  aiSummary: e.ai_summary || undefined,
  aiCause: e.ai_cause || undefined,
  aiSuggest: e.ai_suggest || undefined,
  aiScript: e.ai_script || undefined,
  aiStatus: e.ai_status,
  createdAt: e.created_at || null,
});

const EVENT_TYPES = {
  conflict:  { key: 'conflict',  label: '冲突', emoji: '🫧', cls: 'tag-conflict' },
  important: { key: 'important', label: '重要', emoji: '🌟', cls: 'tag-important' },
  habit:     { key: 'habit',     label: '习惯', emoji: '🌱', cls: 'tag-habit' },
  daily:     { key: 'daily',     label: '日常', emoji: '🍵', cls: 'tag-daily' },
};

/* EVENTS now comes from API — populated in App loadData() */

/* DAILY_REPORT comes from /api/daily-report once the 07:30 job produces one.
   If null, getDailyReport() below falls through to a gentle placeholder. */
let DAILY_REPORT = null;

const formatReportDate = (yyyymmdd) => {
  if (!yyyymmdd) return '';
  const [y, m, d] = yyyymmdd.split('-').map(Number);
  const weekdays = ['周日','周一','周二','周三','周四','周五','周六'];
  const dt = new Date(y, m - 1, d);
  return `${m} 月 ${d} 日 · ${weekdays[dt.getDay()]}`;
};

// All date/time the UI renders is Beijing (UTC+8) regardless of the device's
// local timezone, matching the backend's event_date field.
const BJ_TZ = 'Asia/Shanghai';
const _bjFmt = (opts) => new Intl.DateTimeFormat('zh-CN', { timeZone: BJ_TZ, ...opts });
const beijingDateYMD = () => {
  const p = _bjFmt({ year: 'numeric', month: '2-digit', day: '2-digit' }).formatToParts(new Date());
  const o = Object.fromEntries(p.map(x => [x.type, x.value]));
  return `${o.year}-${o.month}-${o.day}`;
};
const beijingDateLabel = () => {
  const p = _bjFmt({ year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' }).formatToParts(new Date());
  const o = Object.fromEntries(p.map(x => [x.type, x.value]));
  return `${o.year} 年 ${o.month} ${o.day} 日 · ${o.weekday}`;
};
const beijingTimeHHMM = () => {
  return _bjFmt({ hour: '2-digit', minute: '2-digit', hour12: false }).format(new Date());
};

const AI_ADVICE = [
  { id: 'a1', kind: '沟通', for: 'mom',
    title: '和女儿谈作业节奏',
    body: '不要开场就说"快去写作业"。先问"你打算怎么安排今晚？"把选择权还给她。',
    action: '试试这个开场' },
  { id: 'a2', kind: '习惯', for: 'family',
    title: '建立"餐后 10 分钟家庭闲聊"',
    body: '每人说一件今天的小事。能显著减少冲突，增强归属感。',
    action: '加入今日日程' },
  { id: 'a3', kind: '沟通', for: 'dad',
    title: '夸奖儿子时要具体',
    body: '不说"真棒"，说"你卡住那次没放弃，这个过程我看到了"。',
    action: '今晚试试' },
];

/* ========== perspective ========== */
const REL_MAP = {
  dad:      { dad: '我',    mom: '老婆',  daughter: '女儿', son: '儿子' },
  mom:      { dad: '老公',  mom: '我',    daughter: '女儿', son: '儿子' },
  daughter: { dad: '爸爸',  mom: '妈妈',  daughter: '我',   son: '弟弟' },
  son:      { dad: '爸爸',  mom: '妈妈',  daughter: '姐姐', son: '我' },
};

const relabel = (text, viewerId) => {
  if (!text || !viewerId) return text;
  const map = REL_MAP[viewerId] || REL_MAP.dad;
  let result = text;
  const pairs = [
    ['爸爸', map.dad], ['妈妈', map.mom],
    ['女儿', map.daughter], ['儿子', map.son],
  ];
  for (const [from, to] of pairs) {
    if (from !== to) result = result.split(from).join(to);
  }
  return result;
};

const displayName = (memberId, viewerId) => {
  if (!viewerId || viewerId === memberId) return FAMILY[memberId]?.name;
  return (REL_MAP[viewerId] && REL_MAP[viewerId][memberId]) || FAMILY[memberId]?.name;
};

const visibleEvents = (viewerId) => {
  const user = FAMILY[viewerId];
  if (!user) return EVENTS;
  if (user.role === 'editor') return EVENTS;
  return EVENTS.filter(e => e.members.includes(viewerId));
};

const localizeEvent = (event, viewerId) => {
  if (!event) return event;
  const localized = { ...event };
  ['title', 'desc', 'aiSummary', 'aiScript'].forEach(k => {
    if (localized[k]) localized[k] = relabel(localized[k], viewerId);
  });
  if (localized.aiCause) localized.aiCause = localized.aiCause.map(s => relabel(s, viewerId));
  if (localized.aiSuggest) localized.aiSuggest = localized.aiSuggest.map(s => relabel(s, viewerId));
  return localized;
};

const getDailyReport = (viewerId) => {
  const user = FAMILY[viewerId];
  const isKid = user && user.role === 'viewer';

  // Nothing generated yet — gentle placeholder.
  if (!DAILY_REPORT) {
    return {
      title: isKid ? '我的小日报' : '家庭小报告',
      date: '等待明早 07:30',
      highlight: '明天早上 7:30，AI 会把昨天的事总结成一份小报告送来。先记几条今天的事吧 ✨',
      good: [],
      watch: [],
      tip: '睡前花 30 秒记录一件今天印象最深的小事。',
    };
  }

  const date = formatReportDate(DAILY_REPORT.report_date) || '';

  if (!isKid) {
    return {
      title: '家庭小报告',
      date,
      highlight: relabel(DAILY_REPORT.highlight, viewerId),
      good: (DAILY_REPORT.good || []).map(s => relabel(s, viewerId)),
      watch: (DAILY_REPORT.watch || []).map(s => relabel(s, viewerId)),
      tip: relabel(DAILY_REPORT.tip, viewerId),
    };
  }

  // Kids see the shared report but framed more personally + filtered to
  // items that mention them (heuristic: title has their name or a relation
  // word). Keeps L3 AI-maintained and child-safe.
  const myName = FAMILY[viewerId]?.name || '';
  const mentions = (line) => !myName || line.includes(myName) || line.includes('全家') || line.includes('一起');
  return {
    title: '我的小日报',
    date,
    highlight: relabel(DAILY_REPORT.highlight, viewerId),
    good: (DAILY_REPORT.good || []).filter(mentions).map(s => relabel(s, viewerId)),
    watch: (DAILY_REPORT.watch || []).filter(mentions).map(s => relabel(s, viewerId)),
    tip: relabel(DAILY_REPORT.tip, viewerId),
  };
};

/* ========== screens: event detail ========== */
const EventDetailScreen = ({ event: rawEvent, onClose, currentUser, onReanalyzed }) => {
  if (!rawEvent) return null;
  const [regenBusy, setRegenBusy] = useState(false);
  const event = localizeEvent(rawEvent, currentUser.id);

  const regenerate = async () => {
    if (regenBusy || rawEvent.aiStatus === 'pending') return;
    setRegenBusy(true);
    try {
      const updated = await api(`/api/events/${rawEvent.id}/reanalyze`, { method: 'POST' });
      // status is now pending; keep old analysis visible. The App's polling
      // effect will pick up the final result when the worker finishes.
      onReanalyzed && onReanalyzed(updated);
    } catch (e) {
      alert('重新生成失败：' + e.message);
    } finally {
      setRegenBusy(false);
    }
  };
  const author = FAMILY[event.author];
  const authorName = displayName(event.author, currentUser.id);
  const heroTone = event.type === 'conflict' ? 'coral' : event.type === 'important' ? 'honey' : event.type === 'habit' ? 'olive' : 'lavender';

  return (
    <div className="app scroll-hide">
      <div style={{
        padding: '16px 16px 24px',
        background: `linear-gradient(180deg, var(--${heroTone}-soft) 0%, var(--bg) 100%)`,

          <button onClick={onClose} style={{
            border: 0, background: 'var(--surface)', width: 36, height: 36, borderRadius: '50%',

        </div>

              display: 'flex', alignItems: 'center', gap: 12,
              padding: '12px 16px', borderTop: i === 0 ? 0 : '1px solid var(--line-soft)',
            }}>
              <div style={{
                width: 36, height: 36, borderRadius: 12, background: 'var(--lavender-soft)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',

};

const aiPortrait = (m) => {
  const map = {
    dad: '理性、耐心的守护者。习惯用动手解决问题，情绪表达偏内敛——家人其实很期待你多说一句"我爱你"。',
    mom: '温柔的掌舵人。共情力是你的超能力，但也请记得先照顾好自己，再去照顾全家。',
    daughter: '细腻敏感的小作家。文字是你情绪的出口，物理只是暂时的，陪伴比成绩更重要。',
    son: '热情四射的小太阳。数字感让你在数学上游刃有余，写字这件事可以慢慢来。',
  };
  return map[m.id] || '';
};

const ChipEditor = ({ items, onChange, color = 'coral' }) => {
  const [input, setInput] = useState('');
  const add = () => {
    const v = input.trim();
    if (!v || items.includes(v)) return setInput('');
    onChange([...items, v]);
    setInput('');
  };
  const remove = (i) => onChange(items.filter((_, idx) => idx !== i));
  return (
    <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, alignItems: 'center' }}>
      {items.map((t, i) => (
        <span key={i} className="chip" style={{
          background: `var(--${color}-soft)`, color: 'var(--ink)', fontWeight: 600,
          paddingRight: 4, display: 'inline-flex', alignItems: 'center', gap: 4,
        }}>
          {t}
          <button onClick={() => remove(i)} style={{
            border: 0, background: 'rgba(0,0,0,0.08)', color: 'var(--ink-soft)',
            cursor: 'pointer', padding: 0, width: 16, height: 16,
            borderRadius: '50%', fontSize: 10, lineHeight: '16px',
          }}>×</button>
        </span>
      ))}
      <input
        value={input}
        onChange={e => setInput(e.target.value)}
        onKeyDown={e => {
          if (e.key === 'Enter') { e.preventDefault(); add(); }
          if (e.key === 'Backspace' && !input && items.length) remove(items.length - 1);
        }}
        onBlur={add}
        placeholder="+ 添加"
        style={{
          border: '1px dashed var(--line)', outline: 'none', background: 'transparent',
          padding: '3px 10px', borderRadius: 999, fontSize: 12,
          width: 80, color: 'var(--ink)', fontFamily: 'inherit',
        }}
      />
    </div>
  );
};

const EditableRow = ({ label, value, onChange, placeholder }) => (
  <div style={{ display: 'flex', gap: 10, padding: '6px 0', fontSize: 13, lineHeight: 1.55, alignItems: 'center' }}>
    <div style={{ width: 72, color: 'var(--ink-faint)', flexShrink: 0 }}>{label}</div>
    <input
      value={value || ''}
      onChange={e => onChange(e.target.value)}
      placeholder={placeholder || ''}
      style={{
        flex: 1, border: '1px solid var(--line)', background: 'var(--surface-muted)',
        padding: '6px 10px', borderRadius: 8, fontSize: 13,
        color: 'var(--ink)', fontFamily: 'inherit', outline: 'none',
      }}/>
  </div>
);

const MemberDetailScreen = ({ memberId, onBack, currentUser, onUpdated }) => {
  const m = FAMILY[memberId];
  if (!m) return null;

  const isKid = m.id === 'daughter' || m.id === 'son';
  const accent = m.id === 'dad' ? 'coral' : m.id === 'mom' ? 'olive' : m.id === 'daughter' ? 'lavender' : 'honey';
  const canEdit = currentUser && (currentUser.id === m.id || currentUser.role === 'editor');

  const [editMode, setEditMode] = useState(false);
  const [form, setForm] = useState(null);
  const [saving, setSaving] = useState(false);

  // Seed the draft when entering edit mode (or member switches).
  const beginEdit = () => {
    setForm({
      nickname: m.nickname || '',
      age: m.age ?? '',
      birthday: m.birthday || '',
      zodiac: m.zodiac || '',
      mbti: m.mbti || '',
      occupation: m.occupation || '',
      company: m.company || '',
      workHours: m.workHours || '',
      commute: m.commute || '',
      favFood: m.favFood || '',
      strengths: Array.isArray(m.strengths) ? [...m.strengths] : [],
      improvements: Array.isArray(m.improvements) ? [...m.improvements] : [],
      hobbies: Array.isArray(m.hobbies) ? [...m.hobbies] : [],
    });
    setEditMode(true);
  };
  const cancelEdit = () => { setForm(null); setEditMode(false); };

  const save = async () => {
    if (!form || saving) return;
    setSaving(true);
    try {
      // Split the patch: `nickname` is a top-level column, everything else
      // goes into the `profile` JSON.
      const profile = {
        age: form.age === '' ? null : Number(form.age) || null,
        birthday: form.birthday || null,
        zodiac: form.zodiac || null,
        mbti: form.mbti || null,
        occupation: form.occupation || null,
        company: form.company || null,
        workHours: form.workHours || null,
        commute: form.commute || null,
        favFood: form.favFood || null,
        strengths: form.strengths,
        improvements: form.improvements,
        hobbies: form.hobbies,
      };
      // keep grade untouched (server merges the rest of profile)
      if (m.grade) profile.grade = m.grade;
      const updated = await api(`/api/users/${m.id}`, {
        method: 'PATCH',
        body: JSON.stringify({ nickname: form.nickname, profile }),
      });
      // Rebuild FAMILY entry from the server response
      const p = updated.profile || {};
      FAMILY[m.id] = {
        ...updated, ...p,
        tag: updated.role === 'editor' ? '编辑者' : '查看者',
        recordCount: p.recordCount ?? m.recordCount ?? 0,
      };
      MEMBERS_LIST = ['dad','mom','daughter','son'].map(id => FAMILY[id]).filter(Boolean);
      onUpdated && onUpdated();
      setEditMode(false);
    } catch (e) {
      alert('保存失败：' + e.message);
    } finally {
      setSaving(false);
    }
  };

  const upd = (k, v) => setForm(f => ({ ...f, [k]: v }));

  return (
    <div className="app scroll-hide">
      <div style={{
        padding: '16px 20px 28px',
        background: `linear-gradient(180deg, var(--${accent}-soft) 0%, var(--bg) 100%)`,
      }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 16 }}>
          <button onClick={editMode ? cancelEdit : onBack} style={{
            border: 0, background: 'var(--surface)', width: 36, height: 36, borderRadius: '50%',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: 'var(--shadow-soft)', color: 'var(--ink)', cursor: 'pointer',
          }}>
            <Icon name={editMode ? 'close' : 'arrow-left'} size={editMode ? 16 : 18}/>
          </button>
          {canEdit && (
            editMode ? (
              <button onClick={save} disabled={saving} style={{
                border: 0, background: 'var(--coral)',
                padding: '0 16px', height: 36, borderRadius: 999,
                display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 6,
                boxShadow: 'var(--shadow-soft)', color: '#fff', cursor: 'pointer',
                fontSize: 13, fontWeight: 700, opacity: saving ? 0.6 : 1,
              }}>
                <Icon name="check" size={15}/>{saving ? '保存中…' : '保存'}
              </button>
            ) : (
              <button onClick={beginEdit} style={{
                border: 0, background: 'var(--surface)', width: 36, height: 36, borderRadius: '50%',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: 'var(--shadow-soft)', color: 'var(--ink)', cursor: 'pointer',
              }}><Icon name="edit" size={15}/></button>
            )
          )}
        </div>
        <div style={{ display: 'flex', gap: 16, alignItems: 'center' }}>
          <Avatar member={m} size="lg"/>
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'baseline', gap: 8, flexWrap: 'wrap' }}>
              <div style={{ fontSize: 22, fontWeight: 800 }}>{m.name}</div>
              {editMode ? (
                <input
                  value={form.nickname}
                  onChange={e => upd('nickname', e.target.value)}
                  placeholder="昵称"
                  style={{
                    border: '1px solid var(--line)', background: 'var(--surface)',
                    padding: '4px 10px', borderRadius: 8, fontSize: 14,
                    color: `var(--${accent})`, fontFamily: 'var(--font-hand)', fontWeight: 700,
                    width: 140, outline: 'none',
                  }}/>
              ) : (
                <div className="hand" style={{ fontSize: 20, color: `var(--${accent})`, lineHeight: 1 }}>{m.nickname}</div>
              )}
            </div>
            {!editMode && (
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 4 }}>
                {m.age} 岁 · {m.zodiac} · {m.mbti}
              </div>
            )}
            <div style={{ marginTop: 8, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
              <span className="chip" style={{ background: m.role === 'editor' ? 'var(--coral-soft)' : 'var(--lavender-soft)', color: 'var(--ink)' }}>
                {m.role === 'editor' ? '✎ 编辑者' : '👁 查看者'}
              </span>
              {!editMode && <span className="chip">🎂 {m.birthday}</span>}
            </div>
          </div>
        </div>

        {!editMode && (
          <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
            <MiniStat label="记录事件" value={m.recordCount || 0}/>
            <MiniStat label="收到建议" value={Math.round((m.recordCount || 0) * 0.4)}/>
            <MiniStat label="习惯打卡" value={isKid ? 12 : 8}/>
          </div>
        )}
      </div>

      <div style={{ padding: '16px 16px 120px', display: 'flex', flexDirection: 'column', gap: 14 }}>
        {editMode ? (
          <>
            <Section title="🪪 基础">
              <EditableRow label="年龄" value={form.age} onChange={v => upd('age', v.replace(/\D/g, ''))} placeholder="岁数"/>
              <EditableRow label="生日" value={form.birthday} onChange={v => upd('birthday', v)} placeholder="YYYY-MM-DD"/>
              <EditableRow label="星座" value={form.zodiac} onChange={v => upd('zodiac', v)} placeholder="♓ / 白羊 / ..."/>
              <EditableRow label="MBTI" value={form.mbti} onChange={v => upd('mbti', v.toUpperCase())} placeholder="INTJ / ENFP ..."/>
            </Section>

            <Section title={isKid ? '📚 学习' : '💼 工作'}>
              <EditableRow label="身份" value={form.occupation} onChange={v => upd('occupation', v)}/>
              <EditableRow label={isKid ? '学校班级' : '所在单位'} value={form.company} onChange={v => upd('company', v)}/>
              <EditableRow label="时间" value={form.workHours} onChange={v => upd('workHours', v)}/>
              <EditableRow label="通勤" value={form.commute} onChange={v => upd('commute', v)}/>
            </Section>

            <Section title="🌱 性格画像">
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginBottom: 8 }}>闪光点</div>
              <ChipEditor items={form.strengths} onChange={v => upd('strengths', v)} color="olive"/>
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, margin: '14px 0 8px' }}>成长空间</div>
              <ChipEditor items={form.improvements} onChange={v => upd('improvements', v)} color="coral"/>
            </Section>

            <Section title="❤️ 喜好">
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginBottom: 8 }}>爱好</div>
              <ChipEditor items={form.hobbies} onChange={v => upd('hobbies', v)} color={accent}/>
              <div style={{ marginTop: 14 }}>
                <EditableRow label="最爱吃" value={form.favFood} onChange={v => upd('favFood', v)}/>
              </div>
            </Section>

            {m.grade && (
              <div style={{ padding: 12, background: 'var(--surface-muted)', borderRadius: 12,
                fontSize: 12, color: 'var(--ink-soft)', lineHeight: 1.5 }}>
                📊 成绩档保留不动。后续单独出一个编辑页（科目/名次要按学期维护）。
              </div>
            )}
          </>
        ) : (
          <>
            <Section title={isKid ? '📚 学习' : '💼 工作'}>
              <InfoRow label="身份" value={m.occupation}/>
              <InfoRow label={isKid ? '学校班级' : '所在单位'} value={m.company}/>
              <InfoRow label="时间" value={m.workHours}/>
              <InfoRow label="通勤" value={m.commute}/>
            </Section>

            {m.grade && (
              <Section title="📊 最近成绩">
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10,
                  padding: '8px 12px', background: `var(--${accent}-soft)`, borderRadius: 10,
                  fontSize: 13, color: 'var(--ink)', fontWeight: 700,
                }}>
                  🏆 {m.grade.rank}
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                  {m.grade.subjects.map(s => {
                    const trendColor = s.trend === 'up' ? 'var(--olive)' : s.trend === 'down' ? 'var(--coral)' : 'var(--ink-faint)';
                    const trendArrow = s.trend === 'up' ? '↑' : s.trend === 'down' ? '↓' : '—';
                    return (
                      <div key={s.k} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <div style={{ width: 44, fontSize: 13, color: 'var(--ink-soft)', fontWeight: 700 }}>{s.k}</div>
                        <div style={{ flex: 1, height: 8, background: 'var(--surface-muted)', borderRadius: 999, overflow: 'hidden' }}>
                          <div style={{
                            width: `${s.s}%`, height: '100%',
                            background: `var(--${accent})`, borderRadius: 999,
                          }}/>
                        </div>
                        <div style={{ width: 48, textAlign: 'right', fontSize: 14, fontWeight: 800, color: 'var(--ink)' }}>
                          {s.s}<span style={{ fontSize: 11, color: trendColor, marginLeft: 3 }}>{trendArrow}</span>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </Section>
            )}

            <Section title="🌱 性格画像">
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginBottom: 8 }}>闪光点</div>
              <TagRow items={m.strengths || []} color="olive"/>
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, margin: '14px 0 8px' }}>成长空间</div>
              <TagRow items={m.improvements || []} color="coral"/>
            </Section>

            <Section title="❤️ 喜好">
              <div style={{ fontSize: 12, color: 'var(--ink-soft)', fontWeight: 700, marginBottom: 8 }}>爱好</div>
              <TagRow items={m.hobbies || []} color={accent}/>
              <InfoRow label="最爱吃" value={m.favFood}/>
            </Section>

            <div className="card ai-card" style={{ padding: 14 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10 }}>
                <Icon name="sparkle" size={14} color="var(--lavender)"/>
                <div style={{ fontSize: 12, fontWeight: 800 }}>AI · {m.name}的关键词</div>
              </div>
              <div style={{ fontSize: 13, color: 'var(--ink)', lineHeight: 1.6 }}>
                {aiPortrait(m)}
              </div>
            </div>
          </>
        )}
      </div>
    </div>
  );
};

  const update = (k, v) => setSettings(s => ({ ...s, [k]: v }));

  return (
    <div style={{
      position: 'fixed', right: 24, top: 68, zIndex: 10000,
      width: 300, background: '#2a2622', color: '#f4ecde',
      borderRadius: 18, padding: 16, fontFamily: 'ui-monospace, Menlo, monospace',
      boxShadow: '0 20px 60px rgba(0,0,0,0.45)', border: '1px solid rgba(255,255,255,0.1)',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 14 }}>
        <div style={{ fontSize: 13, fontWeight: 700, letterSpacing: 1 }}>外观设置</div>

      </div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10, opacity: 0.6, marginBottom: 6 }}>外观模式</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {['light', 'dark'].map(m => (
            <button key={m} onClick={() => update('dark', m === 'dark')} style={{
              flex: 1, border: 0, padding: '8px', borderRadius: 10, cursor: 'pointer',
              background: settings.dark === (m === 'dark') ? '#D98F6C' : 'rgba(255,255,255,0.08)',
              color: '#f4ecde', fontFamily: 'inherit', fontSize: 11,
            }}>{m === 'light' ? '☀ 浅色' : '🌙 深色'}</button>
          ))}
        </div>
      </div>

      <div style={{ marginBottom: 14 }}>
        <div style={{ fontSize: 10, opacity: 0.6, marginBottom: 6 }}>配色方案</div>
        <div style={{ display: 'flex', gap: 6 }}>
          {[
            { k: 'default', l: '奶油', c: '#D98F6C' },
            { k: 'mint', l: '薄荷', c: '#6FA78A' },
            { k: 'rose', l: '玫瑰', c: '#D97461' },

            <button key={p.k} onClick={() => update('palette', p.k)} style={{

              <div style={{ width: 18, height: 18, borderRadius: '50%', background: p.c }}/>
              {p.l}
            </button>
          ))}
        </div>
      </div>

      <div>
        <div style={{ fontSize: 10, opacity: 0.6, marginBottom: 6 }}>字号：{Math.round(settings.fontScale * 100)}%</div>
        <input type="range" min="0.85" max="1.2" step="0.05"
          value={settings.fontScale} onChange={e => update('fontScale', parseFloat(e.target.value))}
          style={{ width: '100%' }}/>
      </div>

      <div style={{ marginTop: 12, paddingTop: 12, borderTop: '1px solid rgba(255,255,255,0.1)',
        fontSize: 10, opacity: 0.5, lineHeight: 1.5 }}>
        外观设置会在这台手机上记住。
      </div>
    </div>
  );
};

/* ========== phone frame + nav ========== */
const StatusBar = () => (
  <div className="status-bar">
    <span>9:30</span>
    <span style={{ display: 'flex', gap: 6, fontSize: 11 }}>
      <span>●●●</span><span>📶</span><span>🔋</span>
    </span>
  </div>
);

const Phone = ({ children }) => (
  <div style={{
    width: '100%', height: '100%',
    display: 'flex', flexDirection: 'column',
    background: 'var(--bg)', overflow: 'hidden',
    paddingTop: 'env(safe-area-inset-top)',
    paddingBottom: 'env(safe-area-inset-bottom)',
  }}>
    {children}
  </div>
);

const BottomNav = ({ active, onChange, onAdd, currentUser }) => {
  const isViewer = currentUser && currentUser.role === 'viewer';
  const allItems = [
    { k: 'home', l: '首页', i: 'home' },
    { k: 'timeline', l: '时间线', i: 'list' },
    { k: 'add', l: '', i: 'plus', special: true },
    { k: 'advice', l: '建议', i: 'sparkle' },
    { k: 'settings', l: '我们家', i: 'family' },
  ];
  const items = isViewer ? allItems.filter(it => it.k !== 'add') : allItems;
  return (
    <div className="tabbar" style={{ position: 'relative', flexShrink: 0 }}>
      {items.map(it => {
        if (it.special) {
          return (
            <button key={it.k} onClick={onAdd} style={{
              background: 'transparent', position: 'relative', flex: 1,
            }}>
              <div style={{
                width: 52, height: 52, borderRadius: 18, background: 'var(--coral)',
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 6px 14px rgba(217,143,108,0.4)', marginTop: -18,
              }}>
                <Icon name="plus" size={24}/>
              </div>
            </button>
          );
        }
        return (
          <button key={it.k} onClick={() => onChange(it.k)} className={active === it.k ? 'active' : ''}>
            <Icon name={it.i} size={20}/>
            <span>{it.l}</span>
          </button>
        );
      })}
    </div>
  );
};

/* ========== notification panel ========== */
const NotifPanel = ({ open, onClose, events, dailyReport, currentUser, onOpenEvent, onMarkAllRead }) => {
  if (!open) return null;

  const lastSeen = Number(localStorage.getItem('family-last-notif-seen') || 0);
  const items = [];

  // today's daily report (if newer than lastSeen)
  if (dailyReport?.report_date) {
    const reportTs = new Date(dailyReport.report_date + 'T07:30:00+08:00').getTime();
    if (reportTs > lastSeen) {
      items.push({
        key: 'report-' + dailyReport.report_date,
        ts: reportTs,
        icon: '📅',
        title: `${formatReportDate(dailyReport.report_date)} 小报告`,
        body: dailyReport.highlight?.slice(0, 60) || '',
        onTap: () => { onMarkAllRead(); onClose(); },
      });
    }
  }

  // events with a fresh AI summary, not authored by me
  events.forEach(e => {
    if (!e.aiSummary) return;
    if (e.author === currentUser.id) return;
    const ts = new Date(e.createdAt || 0).getTime() || Date.now();
    if (ts <= lastSeen) return;
    items.push({
      key: 'event-' + e.id,
      ts,
      icon: EVENT_TYPES[e.type]?.emoji || '·',
      title: e.title,
      body: e.aiSummary.slice(0, 60),
      onTap: () => { onMarkAllRead(); onClose(); onOpenEvent(e); },
    });
  });

  items.sort((a, b) => b.ts - a.ts);

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, zIndex: 200, background: 'rgba(0,0,0,0.35)',
      display: 'flex', alignItems: 'flex-end',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: 'var(--bg)', width: '100%',
        borderTopLeftRadius: 24, borderTopRightRadius: 24,
        padding: '16px 16px calc(24px + env(safe-area-inset-bottom))',
        maxHeight: '75%', overflowY: 'auto',
        boxShadow: '0 -8px 40px rgba(0,0,0,0.25)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
          <div style={{ fontSize: 18, fontWeight: 800 }}>通知</div>
          {items.length > 0 && (
            <button onClick={() => { onMarkAllRead(); onClose(); }} style={{
              border: 0, background: 'transparent', color: 'var(--coral)',
              fontSize: 13, fontWeight: 700, cursor: 'pointer',
            }}>全部已读</button>
          )}
        </div>

        {items.length === 0 ? (
          <div style={{ padding: '40px 16px', textAlign: 'center', color: 'var(--ink-faint)', fontSize: 13 }}>
            暂时没有新通知 🌿
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {items.map(it => (
              <button key={it.key} onClick={it.onTap} style={{
                border: 0, background: 'var(--surface)', borderRadius: 14,
                padding: 14, textAlign: 'left', cursor: 'pointer',
                boxShadow: 'var(--shadow-soft)',
                display: 'flex', gap: 10, alignItems: 'flex-start',
              }}>
                <div style={{ fontSize: 20 }}>{it.icon}</div>
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: 'var(--ink)' }}>{it.title}</div>
                  <div style={{ fontSize: 12, color: 'var(--ink-soft)', marginTop: 2 }}>{it.body}</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
    </div>
  );
};

/* ========== login ========== */
const LoginScreen = ({ onLogin }) => {
  const [users, setUsers] = useState([]);
  const [selectedId, setSelectedId] = useState(null);
  const [pin, setPin] = useState('');
  const [err, setErr] = useState('');
  const [busy, setBusy] = useState(false);

  useEffect(() => {
    // public endpoint — fetch the member roster to render picker
    fetch(`${API_BASE}/api/roster`, { headers: { 'Cache-Control': 'no-cache' } })
      .then(r => r.ok ? r.json() : [])
      .then(setUsers)
      .catch(() => setErr('连不上服务器，请稍后再试'));
  }, []);

  const submit = async () => {
    if (!selectedId || pin.length < 4) return;
    setBusy(true); setErr('');
    try {
      const res = await fetch(`${API_BASE}/api/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: selectedId, pin }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '登录失败');
      storage.token = data.token;
      onLogin(data.user);
    } catch (e) {
      setErr(e.message || '登录失败');
      setPin('');
    } finally {
      setBusy(false);
    }
  };

  const keypad = ['1','2','3','4','5','6','7','8','9','⌫','0','✓'];

  return (
    <div style={{
      width: '100%', height: '100%', display: 'flex', flexDirection: 'column',
      background: 'linear-gradient(180deg, var(--bg-soft) 0%, var(--bg) 60%)',
      padding: '40px 24px 24px', overflowY: 'auto',
    }}>
      <div style={{ textAlign: 'center', marginBottom: 24 }}>
        <div style={{ fontSize: 40, marginBottom: 6 }}>🏡</div>
        <div style={{ fontSize: 22, fontWeight: 800 }}>家庭管理系统</div>
        <div className="hand" style={{ fontSize: 20, color: 'var(--coral)', lineHeight: 1.2 }}>选一个身份登录</div>
      </div>

      {!users.length && !err && (
        <div style={{ textAlign: 'center', color: 'var(--ink-faint)', fontSize: 13, padding: 20 }}>
          加载中... ⏳
        </div>
      )}

      {users.length > 0 && (
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10,
          marginBottom: 20,
        }}>
          {users.map(u => {
            const on = selectedId === u.id;
            return (
              <button key={u.id} onClick={() => { setSelectedId(u.id); setPin(''); setErr(''); }} style={{
                border: on ? '2px solid var(--coral)' : '2px solid var(--line-soft)',
                background: on ? 'var(--coral-soft)' : 'var(--surface)',
                borderRadius: 16, padding: '14px 10px', cursor: 'pointer',
                display: 'flex', alignItems: 'center', gap: 10,
                boxShadow: 'var(--shadow-soft)',
              }}>
                <span className={`avatar lg ${u.cls}`}>{u.emoji}</span>
                <div style={{ textAlign: 'left' }}>
                  <div style={{ fontSize: 15, fontWeight: 800 }}>{u.name}</div>
                  <div style={{ fontSize: 11, color: 'var(--ink-soft)' }}>
                    {u.role === 'editor' ? '编辑者' : '查看者'}
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {selectedId && (
        <div style={{ marginTop: 'auto' }}>
          <div style={{ textAlign: 'center', fontSize: 13, color: 'var(--ink-soft)', marginBottom: 10 }}>
            输入 {users.find(u => u.id === selectedId)?.name || selectedId} 的 4 位 PIN
          </div>
          <div style={{ display: 'flex', justifyContent: 'center', gap: 10, marginBottom: 14 }}>
            {[0, 1, 2, 3].map(i => (
              <div key={i} style={{
                width: 44, height: 52, borderRadius: 12,
                background: 'var(--surface)', border: '1px solid var(--line-soft)',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 24, fontWeight: 800,
                boxShadow: 'var(--shadow-soft)',
              }}>{pin[i] ? '●' : ''}</div>
            ))}
          </div>
          {err && (
            <div style={{ textAlign: 'center', color: 'var(--coral)', fontSize: 12, marginBottom: 10 }}>
              {err}
            </div>
          )}
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8, maxWidth: 280, margin: '0 auto' }}>
            {keypad.map((k, i) => {
              const isBack = k === '⌫';
              const isOk = k === '✓';
              const onTap = () => {
                if (busy) return;
                if (isBack) return setPin(p => p.slice(0, -1));
                if (isOk) return submit();
                if (pin.length < 4) setPin(p => p + k);
              };
              return (
                <button key={i} onClick={onTap} disabled={busy || (isOk && pin.length < 4)} style={{
                  border: 0, borderRadius: 14,
                  padding: '14px 0', fontSize: 20, fontWeight: 700,
                  background: isOk ? 'var(--coral)' : 'var(--surface)',
                  color: isOk ? '#fff' : 'var(--ink)',
                  opacity: (isOk && pin.length < 4) ? 0.4 : 1,
                  boxShadow: 'var(--shadow-soft)', cursor: 'pointer',
                }}>{k}</button>
              );
            })}
          </div>
        </div>
      )}

      <div style={{ textAlign: 'center', marginTop: 20, fontSize: 11, color: 'var(--ink-faint)' }}>
        默认 PIN：爸 1111 · 妈 2222 · 女 3333 · 儿 4444
      </div>
    </div>
  );
};

/* ========== root app ========== */
const TWEAK_DEFAULTS = {
  dark: false,
  palette: 'default',
  fontScale: 1,
};

const App = () => {
  const [settings, setSettings] = useState(() => {
    try {
      const s = localStorage.getItem('family-tweaks');
      if (s) return { ...TWEAK_DEFAULTS, ...JSON.parse(s) };
    } catch {}
    return TWEAK_DEFAULTS;
  });
  const [showTweaks, setShowTweaks] = useState(false);
  const [scene, setScene] = useState('home');
  const [activeTab, setActiveTab] = useState('home');
  const [selectedEvent, setSelectedEvent] = useState(null);
  const [selectedMemberId, setSelectedMemberId] = useState('dad');

  const [authed, setAuthed] = useState(!!storage.token);
  const [currentUser, setCurrentUser] = useState(null);
  const [loadError, setLoadError] = useState('');
  const [showNotif, setShowNotif] = useState(false);
  const [notifTick, setNotifTick] = useState(0);
  const [, forceTick] = useState(0);
  const rerender = () => forceTick(t => t + 1);

  const markAllNotifRead = () => {
    localStorage.setItem('family-last-notif-seen', String(Date.now()));
    setNotifTick(n => n + 1);
  };

  // Compute hasUnread based on EVENTS + DAILY_REPORT vs last-seen
  const computeUnread = () => {
    const lastSeen = Number(localStorage.getItem('family-last-notif-seen') || 0);
    if (DAILY_REPORT?.report_date) {
      const ts = new Date(DAILY_REPORT.report_date + 'T07:30:00+08:00').getTime();
      if (ts > lastSeen) return true;
    }
    if (currentUser) {
      return EVENTS.some(e => {
        if (!e.aiSummary || e.author === currentUser.id) return false;
        const ts = new Date(e.createdAt || 0).getTime() || 0;
        return ts > lastSeen;
      });
    }
    return false;
  };
  const hasUnread = computeUnread();
  // notifTick referenced so React re-runs above after markAllNotifRead
  void notifTick;

  const loadData = async () => {
    const [me, users, events, daily] = await Promise.all([
      api('/api/me'),
      api('/api/users'),
      api('/api/events'),
      api('/api/daily-report').catch(() => null),  // 204 → null
    ]);
    buildMembers(users);
    EVENTS = events.map(normalizeEvent);
    DAILY_REPORT = daily || null;
    setCurrentUser(FAMILY[me.id]);
  };

  useEffect(() => {
    if (!authed) return;
    loadData().catch(e => {
      if (e.message === 'unauthorized') setAuthed(false);
      else setLoadError(e.message);
    });
    const onUnauth = () => setAuthed(false);
    window.addEventListener('family-unauthorized', onUnauth);
    return () => window.removeEventListener('family-unauthorized', onUnauth);
  }, [authed]);

  // Poll events while any event is still being analyzed; stop once all done.
  useEffect(() => {
    if (!currentUser) return;
    const hasPending = EVENTS.some(e => e.aiStatus === 'pending' || e.aiStatus === 'processing');
    if (!hasPending) return;
    const t = setInterval(async () => {
      try {
        const latest = await api('/api/events');
        EVENTS = latest.map(normalizeEvent);
        // refresh the currently opened detail event if it matches
        if (selectedEvent) {
          const updated = EVENTS.find(e => e.id === selectedEvent.id);
          if (updated) setSelectedEvent(updated);
        }
        rerender();
        if (!EVENTS.some(e => e.aiStatus === 'pending' || e.aiStatus === 'processing')) {
          clearInterval(t);
        }
      } catch {}
    }, 5000);
    return () => clearInterval(t);
  }, [currentUser, selectedEvent?.id, EVENTS.length]);

  useEffect(() => { localStorage.setItem('family-tweaks', JSON.stringify(settings)); }, [settings]);

  useEffect(() => {
    const classes = [];
    if (settings.dark) classes.push('theme-dark');
    if (settings.palette && settings.palette !== 'default') classes.push(`palette-${settings.palette}`);
    document.documentElement.className = classes.join(' ');
    document.documentElement.style.setProperty('--fs-scale', settings.fontScale);
  }, [settings.dark, settings.palette, settings.fontScale]);

  if (!authed) {
    return <LoginScreen onLogin={() => setAuthed(true)}/>;
  }

  if (!currentUser) {
    return (
      <div style={{
        width: '100%', height: '100%', display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        flexDirection: 'column', gap: 12, background: 'var(--bg)',
      }}>
        <div style={{ fontSize: 32 }}>🏡</div>
        <div style={{ fontSize: 13, color: 'var(--ink-soft)' }}>
          {loadError ? `加载失败：${loadError}` : '加载中...'}
        </div>
        {loadError && (
          <button className="btn btn-primary" onClick={() => { setLoadError(''); setAuthed(!!storage.token); loadData().catch(e => setLoadError(e.message)); }}>
            重试
          </button>
        )}
      </div>
    );
  }

  const readOnly = currentUser.role === 'viewer';

  const logout = () => {
    storage.token = null;
    FAMILY = {}; MEMBERS_LIST = []; EVENTS = [];
    setCurrentUser(null);
    setAuthed(false);
    setScene('home');
  };

  const saveEvent = async (payload) => {
    try {
      const created = await api('/api/events', {
        method: 'POST',
        body: JSON.stringify(payload),
      });
      EVENTS = [normalizeEvent(created), ...EVENTS];
      rerender();
      return true;
    } catch (e) {
      alert('保存失败：' + e.message);
      return false;
    }
  };

  if (readOnly && scene === 'add') { setScene('home'); setActiveTab('home'); }

  const openEvent = (ev) => { setSelectedEvent(ev); setScene('detail'); };
  const openMember = (id) => { setSelectedMemberId(id); setScene('member'); };

  let screen;
  switch (scene) {
    case 'home':
      screen = <HomeScreen currentUser={currentUser}
        onOpenEvent={openEvent} onOpenMember={openMember}
        onNavigate={(k) => { setScene(k); setActiveTab(k); }}
        onOpenAdvice={() => { setScene('advice'); setActiveTab('advice'); }}
        onOpenNotif={() => setShowNotif(true)}
        hasUnread={hasUnread}/>;
      break;
    case 'timeline':
      screen = <TimelineScreen currentUser={currentUser} onOpenEvent={openEvent}/>;
      break;
    case 'add':
      screen = <AddEventScreen currentUser={currentUser} readOnly={readOnly}
        onClose={() => { setScene('home'); setActiveTab('home'); }}
        onSave={async (p) => {
          const ok = await saveEvent(p);
          if (ok) { setScene('home'); setActiveTab('home'); }
        }}/>;
      break;
    case 'detail':
      screen = <EventDetailScreen event={selectedEvent} currentUser={currentUser}
        onClose={() => { setScene('timeline'); setActiveTab('timeline'); }}
        onReanalyzed={(updated) => {
          const u = normalizeEvent(updated);
          const idx = EVENTS.findIndex(e => e.id === u.id);
          if (idx >= 0) EVENTS[idx] = u;
          setSelectedEvent(u);
          rerender();
        }}/>;
      break;
    case 'advice':
      screen = <AdviceScreen currentUser={currentUser} onBack={() => { setScene('home'); setActiveTab('home'); }}/>;
      break;
    case 'settings':
      screen = <SettingsScreen currentUser={currentUser} onOpenMember={openMember}
        onOpenTweaks={() => setShowTweaks(true)} onLogout={logout}/>;
      break;
    case 'member':
      screen = <MemberDetailScreen memberId={selectedMemberId} currentUser={currentUser}
        onBack={() => { setScene('settings'); setActiveTab('settings'); }}
        onUpdated={rerender}/>;
      break;
    default:
      screen = <HomeScreen currentUser={currentUser}/>;
  }

  const showBottomNav = scene !== 'add' && scene !== 'detail' && scene !== 'member';

  return (
    <Phone>
      {readOnly && scene !== 'add' && <ReadOnlyBanner who={currentUser}/>}
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
        {screen}
      </div>
      {showBottomNav && (
        <BottomNav active={activeTab} currentUser={currentUser}
          onChange={(k) => { setActiveTab(k); setScene(k); }}
          onAdd={() => { setScene('add'); }}/>
      )}
      <TweaksPanel open={showTweaks} onClose={() => setShowTweaks(false)}
        settings={settings} setSettings={setSettings}/>
      <NotifPanel open={showNotif} onClose={() => setShowNotif(false)}
        events={EVENTS} dailyReport={DAILY_REPORT} currentUser={currentUser}
        onOpenEvent={openEvent} onMarkAllRead={markAllNotifRead}/>
    </Phone>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
