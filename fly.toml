app = "gw-family-manager"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

  [http_service.http_options]
    idle_timeout = 120

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
